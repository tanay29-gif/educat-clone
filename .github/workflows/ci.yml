name: Frontend React CI

on:
  push:
    paths:
      - 'frontend/**'
    # This covers 'main' (Production) and all other branches (Staging)
    branches:
      - '**'
  pull_request:
    paths:
      - 'frontend/**'
    # This covers PRs targeting main (Preview)
    branches:
      - main

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    
    # DYNAMIC ENVIRONMENT LOGIC
    # 1. If it's a Pull Request -> 'Preview'
    # 2. If it's a Push to 'main' -> 'Production'
    # 3. Otherwise (Push to any other branch) -> 'Staging'
    environment:
      name: >-
        ${{ 
          github.event_name == 'pull_request' && 'Preview' || 
          (github.ref == 'refs/heads/main' && 'Production' || 'Staging') 
        }}

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for Linting errors
        run: npm run lint

      - name: Run Tests
        run: npm test -- run

      - name: Check Build errors
        run: npm run build