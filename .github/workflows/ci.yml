name: Frontend React CI

on:
  push:
    paths:
      - 'frontend/**'
    branches:
      - '**'
  pull_request:
    paths:
      - 'frontend/**'
    branches:
      - main

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    
    # NEW LOGIC:
    # If the event is a 'push', it returns '' (no environment).
    # If the event is a 'pull_request' or anything else, it uses 'Preview'.
    environment:
      name: ${{ github.event_name == 'push' && '' || 'Preview' }}

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for Linting errors
        run: npm run lint

      - name: Run Tests
        run: npm test -- run

      - name: Check Build errors
        run: npm run build